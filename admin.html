<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - NutriTech</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#f6f8fc; }
h1,h2 { font-family:'Manrope'; }
.card { background:white; border-radius:16px; padding:20px; box-shadow:0 6px 20px rgba(0,0,0,0.05); }
</style>
</head>
<body data-page="admin" class="flex">

<aside class="w-64 h-screen bg-[#eef3ff] p-6 flex flex-col">
<h2 class="text-green-700 font-bold mb-6">NutriTech Admin</h2>
<div class="text-xs text-gray-500 mb-6">Sesión: <span data-user-email class="font-semibold text-green-700"></span></div>

<nav class="flex flex-col gap-2">
<div class="p-3 bg-white rounded-xl text-green-600 font-bold">Resumen</div>
<div class="p-3 hover:bg-white rounded-xl cursor-pointer">Usuarios</div>
<div class="p-3 hover:bg-white rounded-xl cursor-pointer">Análisis</div>
<div class="p-3 hover:bg-white rounded-xl cursor-pointer">Seguridad</div>
</nav>

<button onclick="window.location.href='dashboard.html'"
class="mt-auto bg-green-600 text-white p-3 rounded-xl">
Volver Dashboard
</button>
<button id="logoutBtn" class="mt-4 text-gray-500">Cerrar sesión</button>
</aside>

<main class="flex-1 p-10">
<div id="globalAlert" class="hidden mb-4"></div>

<div class="flex justify-between items-center mb-10">
<h1 class="text-2xl font-bold text-green-700">Panel de Control Global</h1>
<input placeholder="Buscar usuario..." class="px-4 py-2 rounded-full bg-gray-100">
</div>

<div class="grid grid-cols-3 gap-6 mb-10">
<div class="card">
<p>Uptime</p>
<h2 class="text-3xl font-bold">99.98%</h2>
</div>
<div class="card">
<p>Usuarios</p>
<h2 id="kpiUsers" class="text-3xl font-bold">0</h2>
</div>
<div class="card">
<p>Posts</p>
<h2 id="kpiPosts" class="text-3xl font-bold">0</h2>
</div>
</div>

<div class="card">
<div class="flex justify-between mb-4">
<h2 class="font-bold text-lg">Gestión de Usuarios</h2>
<button id="addUserBtn" class="bg-green-600 text-white px-4 py-2 rounded-full">+ Añadir Usuario</button>
</div>

<table class="w-full text-left">
<thead>
<tr class="text-gray-400 text-sm">
<th>Usuario</th>
<th>Email</th>
<th>Rol</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>
<div id="usersEmpty" class="hidden text-center text-gray-500 py-6">No hay usuarios para mostrar.</div>
</div>
</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
