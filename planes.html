<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planes - NutriTech</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif;background:#f6f8fc}h1,h2{font-family:'Manrope',sans-serif}.card{background:white;border-radius:16px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,.05)}.nav-link-active{color:#047857;font-weight:700}.selected-plan{outline:2px solid #059669}</style>
</head>
<body data-page="planes">
<header class="flex justify-between items-center px-10 py-4 bg-white shadow">
<h1 class="text-green-700 font-bold text-xl">NutriTech</h1>
<nav class="flex gap-6" data-main-nav>
<button type="button" data-nav="dashboard.html">Dashboard</button><button type="button" data-nav="planes.html">Planes</button><button type="button" data-nav="recetas.html">Recetas</button><button type="button" data-nav="comunidad.html">Comunidad</button>
</nav>
<div class="flex items-center gap-4"><div class="text-sm text-gray-500"><span data-user-email class="font-semibold text-green-700"></span></div><button id="logoutBtn" type="button" class="bg-green-600 text-white px-4 py-2 rounded-full">Cerrar sesión</button></div>
</header>
<main class="p-10">
<div id="globalAlert" class="hidden mb-4"></div>
<h2 class="text-3xl font-bold mb-6 text-green-700">Planes Nutricionales</h2>
<div class="grid md:grid-cols-3 gap-6" id="plansGrid">
<div class="card plan-card"><h3 class="font-bold text-lg">Starter</h3><p class="text-gray-500 mb-4">Para iniciar hábitos sostenibles.</p><button type="button" data-plan="Starter" class="bg-green-600 text-white px-4 py-2 rounded-lg">Elegir plan</button></div>
<div class="card plan-card"><h3 class="font-bold text-lg">Performance</h3><p class="text-gray-500 mb-4">Optimiza tu rendimiento y energía.</p><button type="button" data-plan="Performance" class="bg-green-600 text-white px-4 py-2 rounded-lg">Elegir plan</button></div>
<div class="card plan-card"><h3 class="font-bold text-lg">Elite</h3><p class="text-gray-500 mb-4">Seguimiento avanzado y objetivos complejos.</p><button type="button" data-plan="Elite" class="bg-green-600 text-white px-4 py-2 rounded-lg">Elegir plan</button></div>
</div>
<section class="mt-8">
<h3 class="font-bold mb-2">Mis planes guardados</h3>
<ul id="planHistory" class="space-y-2"></ul>
</section>
<div class="mt-8"><button type="button" data-nav="dashboard.html" class="text-green-700 font-semibold">← Volver al dashboard</button></div>
</main>
<script type="module" src="js/main.js"></script>
</body>
</html>
