<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas - NutriTech</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif;background:#f6f8fc}h1,h2{font-family:'Manrope',sans-serif}.card{background:white;border-radius:16px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,.05)}.nav-link-active{color:#047857;font-weight:700}</style>
</head>
<body data-page="recetas">
<header class="flex justify-between items-center px-10 py-4 bg-white shadow">
<h1 class="text-green-700 font-bold text-xl">NutriTech Solutions</h1>
<nav class="flex gap-6" data-main-nav>
<button type="button" data-nav="dashboard.html">Dashboard</button><button type="button" data-nav="planes.html">Planes</button><button type="button" data-nav="recetas.html">Recetas</button><button type="button" data-nav="comunidad.html">Comunidad</button>
</nav>
<div class="flex items-center gap-4"><div class="text-sm text-gray-500"><span data-user-email class="font-semibold text-green-700"></span></div><button id="logoutBtn" type="button" class="bg-green-600 text-white px-4 py-2 rounded-full">Cerrar sesión</button></div>
</header>
<main class="p-10">
<div id="globalAlert" class="hidden mb-4"></div>
<div class="flex justify-between items-center mb-6"><h2 class="text-3xl font-bold text-green-700">Recetas Recomendadas</h2><button type="button" id="refreshRecipesBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg">Actualizar recomendaciones</button></div>
<div id="recipesList" class="grid md:grid-cols-2 gap-6">
<div class="card"><h3 class="font-bold text-lg">Bowl Proteico</h3><p class="text-gray-500 mb-3">Quinoa, pollo y vegetales verdes.</p><button type="button" class="text-green-700 font-semibold" data-nav="planes.html">Ver plan compatible</button></div>
<div class="card"><h3 class="font-bold text-lg">Smoothie Antioxidante</h3><p class="text-gray-500 mb-3">Frutos rojos, yogur griego y avena.</p><button type="button" class="text-green-700 font-semibold" data-nav="planes.html">Ver plan compatible</button></div>
</div>
</main>
<script type="module" src="js/app.js"></script>
</body>
</html>
